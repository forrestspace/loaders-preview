<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interstitial — Alaska / Hawaiian</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@800;900&family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap');

/* ============================================================
   FULL-BLEED BRAND INTERSTITIAL
   The counter (0→100) is the real load value. The slat-shutter
   reveal fires ONCE on completion — no independent loop.
   ============================================================ */
:root{
  --accent:#01426A;          /* Alaska blue */
  --on-accent:#ffffff;       /* text on an accent fill */
  --ink:#0b1620;
  --ink-2:#5b6976;
  --line:#e6e9ed;
  --paper:#ffffff;
  --ease:cubic-bezier(.22,1,.36,1);
  --ease-shutter:cubic-bezier(.76,0,.24,1);
  --font:"DM Sans",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --num:"Space Grotesk",system-ui,sans-serif;
  --display:"Archivo","Helvetica Neue",Helvetica,Arial,sans-serif;
}
:root[data-brand="hawaiian"]{ --accent:#463C8F; }

/* ---- dark mode: page inverts; each brand accent brightens ---- */
:root[data-theme="dark"]{ --ink:#eaeef2; --ink-2:#9ba7b3; --line:#242d37; --paper:#0b1016; }
:root[data-theme="dark"][data-brand="alaska"]{ --accent:#4da3de; --on-accent:#0b1620; }
:root[data-theme="dark"][data-brand="hawaiian"]{ --accent:#9c8ff0; --on-accent:#0b1620; }

*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--font);color:var(--ink);background:var(--paper);overflow:hidden}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}

/* ---------------- revealed page (sits underneath) ---------------- */
.page{position:fixed;inset:0;display:flex;flex-direction:column;padding:26px clamp(20px,5vw,64px)}
.nav{display:flex;align-items:center;justify-content:space-between;padding-bottom:8px}
.nav .brand{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-.01em}
.nav .brand svg{width:26px;height:26px;color:var(--accent)}
.nav .links{display:flex;gap:26px;font-size:14px;color:var(--ink-2)}
.nav .links a{color:inherit;text-decoration:none;transition:color .18s var(--ease)}
.nav .links a:hover{color:var(--ink)}
.hero{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:1100px;width:100%;margin:0 auto}
.hero .eyebrow{font-size:12px;font-weight:650;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
.hero h1{font-family:var(--display);font-weight:900;letter-spacing:-.03em;line-height:.94;
  font-size:clamp(44px,8vw,104px);margin:14px 0 34px}
.card{display:flex;align-items:center;gap:22px;flex-wrap:wrap;
  border:1px solid var(--line);border-radius:18px;padding:22px 24px;max-width:640px;
  box-shadow:0 22px 50px -34px rgba(11,22,32,.4)}
.card .route{display:flex;align-items:baseline;gap:14px;font-family:var(--num);font-weight:600;
  font-size:30px;letter-spacing:-.01em}
.card .route .arw{width:34px;height:1px;background:var(--line);position:relative;top:-9px}
.card .meta{font-size:13px;color:var(--ink-2);margin-top:4px}
.card .cta{margin-left:auto;background:var(--accent);color:var(--on-accent);border:0;border-radius:11px;
  font:inherit;font-weight:600;font-size:14px;padding:13px 22px;cursor:pointer;transition:.18s var(--ease)}
.card .cta:hover{filter:brightness(1.08)}

/* ---------------- curtain (interstitial overlay) ---------------- */
.curtain{position:fixed;inset:0;z-index:50}
.curtain.gone{pointer-events:none}
.slats{position:absolute;inset:0;display:flex}
.slat{flex:1 1 0;height:100%;background:var(--accent);
  transform:translateY(0);transition:transform .58s var(--ease-shutter)}
.curtain.reveal .slat{transform:translateY(-101%)}

/* content layer sits above slats, transparent bg so slats form the field */
.veil{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;transition:opacity .24s var(--ease),transform .34s var(--ease)}
.curtain.reveal .veil{opacity:0;transform:translateY(-26px)}
.wordmark{font-family:var(--display);font-weight:900;color:#fff;
  font-size:clamp(58px,15vw,210px);line-height:.9;letter-spacing:-.045em;margin:0}

/* progress baseline pinned to bottom of the veil */
.bar{position:absolute;left:0;bottom:0;height:2px;width:100%;background:rgba(255,255,255,.16)}
.bar i{display:block;height:100%;width:0;background:#fff;transform-origin:left;transition:width .12s linear}

/* ---------------- demo controls ---------------- */
.controls{position:fixed;top:18px;right:18px;z-index:80;display:flex;gap:8px;align-items:center;
  background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid var(--line);
  border-radius:11px;padding:5px}
.controls .seg{display:inline-flex;gap:2px}
.controls button{font:inherit;font-size:12px;font-weight:600;border:0;background:transparent;color:var(--ink-2);
  padding:7px 12px;border-radius:8px;cursor:pointer;transition:.16s var(--ease)}
.controls button.on{background:var(--accent);color:var(--on-accent)}
.controls .rep{border:1px solid var(--line);color:var(--ink)}
.controls button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
:root[data-theme="dark"] .controls{background:rgba(19,26,34,.9)}

@media (prefers-reduced-motion: reduce){
  .slat,.veil,.bar i{transition:none!important}
}
</style>
</head>
<body>

  <!-- revealed content -->
  <main class="page" aria-hidden="false">
    <nav class="nav">
      <div class="brand">
        <svg viewBox="0 0 100 100" fill="none" aria-hidden="true">
          <circle cx="50" cy="50" r="46" stroke="currentColor" stroke-width="4"/>
          <path d="M24 60 L50 33 L76 60" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M35 69 L50 55 L65 69" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="navName">Alaska</span>
      </div>
      <div class="links">
        <a href="#">Book</a><a href="#">Trips</a><a href="#">Miles</a><a href="#">Check-in</a>
      </div>
    </nav>
    <div class="hero">
      <div class="eyebrow">Good morning, Forrest</div>
      <h1>Where to<br>next?</h1>
      <div class="card">
        <div>
          <div class="route"><span>SEA</span><span class="arw"></span><span>JFK</span></div>
          <div class="meta">Sat, Aug 14 · 1 traveler · Main Cabin</div>
        </div>
        <button class="cta">Search flights</button>
      </div>
    </div>
  </main>

  <!-- interstitial -->
  <div class="curtain" id="curtain">
    <div class="slats" id="slats"></div>
    <div class="veil" id="veil">
      <h1 class="wordmark" id="wordmark">ALASKA</h1>
      <div class="bar"><i id="barFill"></i></div>
    </div>
  </div>

  <div class="controls">
    <div class="seg">
      <button id="bAla" class="on">Alaska</button>
      <button id="bHaw">Hawaiian</button>
    </div>
    <button class="rep" id="theme">☾ Dark</button>
    <button class="rep" id="replay">↻ Replay</button>
  </div>

<script>
const RM = matchMedia('(prefers-reduced-motion: reduce)').matches;
const N_SLATS = 9;
const slatsEl = document.getElementById('slats');
for(let i=0;i<N_SLATS;i++){const s=document.createElement('div');s.className='slat';slatsEl.appendChild(s);}
const slats = [...document.querySelectorAll('.slat')];

const curtain=document.getElementById('curtain'), veil=document.getElementById('veil');
const barFill=document.getElementById('barFill');
const wordmark=document.getElementById('wordmark'), navName=document.getElementById('navName');

let raf=null, revealed=false;

function setBrand(b){
  document.documentElement.setAttribute('data-brand',b);
  wordmark.textContent = b==='hawaiian' ? 'HAWAIIAN' : 'ALASKA';
  navName.textContent  = b==='hawaiian' ? 'Hawaiian' : 'Alaska';
  document.getElementById('bAla').classList.toggle('on',b==='alaska');
  document.getElementById('bHaw').classList.toggle('on',b==='hawaiian');
}

/* the reveal — driven by completion, staggered slats */
function reveal(){
  if(revealed) return; revealed=true;
  slats.forEach((s,i)=> s.style.transitionDelay = (i*42)+'ms');
  veil.style.transitionDelay='0ms';
  curtain.classList.add('reveal');
  const total = 240 + N_SLATS*42 + 580;
  setTimeout(()=> curtain.classList.add('gone'), total);
}

function reset(){
  if(raf) cancelAnimationFrame(raf); raf=null; revealed=false;
  curtain.classList.remove('reveal','gone');
  slats.forEach(s=>{s.style.transitionDelay='0ms';});
  veil.style.transitionDelay='0ms';
  barFill.style.width='0%';
  // force reflow so re-adding transitions animates cleanly
  void curtain.offsetWidth;
}

function render(p){
  const pct=Math.round(p*100);
  barFill.style.width=pct+'%';
  curtain.setAttribute('aria-valuenow',pct);
}

/* hold mode for inspection: #hold freezes curtain at 42% */
function hold(){ reset(); render(0.42); }

function play(){
  reset();
  if(RM){ render(1); setTimeout(()=>curtain.classList.add('gone'),700); return; }
  const dur=2600, holds=[[.34,420],[.72,300]]; // ms of realistic stall
  let start=null, held=0, lastHoldAt=-1;
  function step(t){
    if(start===null) start=t;
    let el=t-start-held;
    // apply a stall window once each
    const raw=Math.min(el/dur,1);
    const stall=holds.find(([at],idx)=> raw>=at && lastHoldAt<idx);
    if(stall){ lastHoldAt=holds.indexOf(stall); held+=stall[1]; el=t-start-held; }
    const p=Math.max(0,Math.min((t-start-held)/dur,1));
    render(p);
    if(p>=1){ setTimeout(reveal,360); return; }
    raf=requestAnimationFrame(step);
  }
  raf=requestAnimationFrame(step);
}

document.getElementById('bAla').addEventListener('click',()=>setBrand('alaska'));
document.getElementById('bHaw').addEventListener('click',()=>setBrand('hawaiian'));
document.getElementById('replay').addEventListener('click',play);

function setTheme(dark){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  document.getElementById('theme').textContent=dark?'☀ Light':'☾ Dark';
}
document.getElementById('theme').addEventListener('click',()=>
  setTheme(document.documentElement.getAttribute('data-theme')!=='dark'));
setTheme(matchMedia('(prefers-color-scheme: dark)').matches);

setBrand('alaska');
if(location.hash==='#hold') hold(); else play();
</script>
</body>
</html>
