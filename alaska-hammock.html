<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alaska hammock loader — Lottie preview</title>
<style>
  html,body{margin:0;height:100%}
  body{background:#01426A;display:flex;align-items:center;justify-content:center}
  #lot{width:min(90vw,620px);aspect-ratio:474/347}
</style>
</head>
<body>
  <div id="lot"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
  <script>
    const anim = lottie.loadAnimation({
      container: document.getElementById('lot'),
      renderer: 'svg', loop: true, autoplay: true,
      path: './alaska-hammock.json'
    });
    window.__anim = anim;
    anim.addEventListener('DOMLoaded', ()=>{ window.__loaded = true; });
    // allow freezing a frame via #f=NN for inspection
    const m = location.hash.match(/f=(\d+)/);
    if(m){ anim.addEventListener('DOMLoaded', ()=>{ anim.goToAndStop(+m[1], true); }); }
  </script>
</body>
</html>
