<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Two-step loader — Alaska / Hawaiian</title>
<style>
/* Auro design tokens (vendored + pinned) — color & type, scoped by data-brand */
@import url("./tokens/auro--alaska.css");
@import url("./tokens/auro--hawaiian.css");
@import url("./tokens/auro-type.css");   /* .heading-lg / .heading-sm */
/* ============================================================
   TWO-STEP LOADER
   Step 1 (loading): animated spinner + animated ellipsis, with a
     status line that can be updated live while the spinner spins.
   Step 2 (complete): a completion icon (swappable) + message.
   Full-bleed brand field; one token (--accent) swaps the brand.
   ============================================================ */
:root{
  --accent:var(--ds-basic-color-surface-inverse,#00274a);    /* Auro: brand field   */
  --on-accent:var(--ds-basic-color-texticon-inverse,#fff);   /* Auro: text on field */
  --ease:cubic-bezier(.22,1,.36,1);
  --font:var(--ds-basic-type-family-body,"AS Circular"),
         var(--ds-basic-type-family-body-fallback,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif);
}
/* --accent + --font now resolve from the vendored Auro tokens, scoped by data-brand */

*{box-sizing:border-box}
html,body{margin:0}
body{font-family:var(--font);background:#e9eaec;color:#1a2330}

/* ---------- demo chrome ---------- */
.bar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  padding:14px 24px;background:#fff;border-bottom:1px solid #e2e5ea;
  box-shadow:0 6px 20px -12px rgba(11,22,32,.22);
}
.brandmark{display:flex;flex-direction:column;line-height:1.15}
.brandmark b{font-size:14px;font-weight:650;letter-spacing:-.01em;color:var(--ds-basic-color-texticon-default,#2a2a2a)}
.brandmark span{font-size:11px;color:var(--ds-basic-color-texticon-muted,#676767);letter-spacing:.02em}
.controls{display:flex;align-items:center;gap:14px;margin-left:auto;flex-wrap:wrap}
.seg{display:inline-flex;background:#f1f3f6;border:1px solid #e2e5ea;border-radius:9px;padding:3px}
.seg button{font:inherit;font-size:12px;font-weight:600;border:0;background:transparent;color:#5b6976;
  padding:6px 12px;border-radius:6px;cursor:pointer;transition:.16s var(--ease)}
.seg button[aria-pressed="true"]{background:var(--accent);color:#fff}
.ctl{display:flex;align-items:center;gap:8px}
.ctl label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#6c7785}
.btn{font:inherit;font-size:12px;font-weight:600;border:1px solid #d7dbe2;background:#fff;color:#1a2330;
  padding:8px 14px;border-radius:8px;cursor:pointer;transition:.16s var(--ease)}
.btn:hover{border-color:#b9c0cc}
.btn.primary{background:var(--accent);color:#fff;border-color:transparent}
input[type=text],select{font:inherit;font-size:13px;padding:7px 10px;border:1px solid #d7dbe2;border-radius:8px;background:#fff;color:#1a2330}
input[type=text]{width:210px}
.spacer{margin-left:auto}
.bar :focus-visible,.stage :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ---------- the loader panel (full-bleed brand field) ---------- */
.panel{margin:26px auto;max-width:1120px;padding:0 20px}
.field{
  position:fixed;inset:0;background:var(--accent);overflow:hidden;
  display:grid;place-items:center;
  transition:background .3s var(--ease);
}
.stage{position:relative;width:100%;height:100%;display:grid;place-items:center;color:var(--on-accent);text-align:center;padding:32px}

/* views cross-fade on state change */
.view{grid-area:1/1;display:flex;flex-direction:column;align-items:center;gap:0;
  transition:opacity .34s var(--ease),transform .34s var(--ease)}
.view.load{opacity:1}
.view.done{opacity:0;transform:translateY(8px);pointer-events:none}
[data-state="complete"] .view.load{opacity:0;transform:translateY(-8px);pointer-events:none}
[data-state="complete"] .view.done{opacity:1;transform:none}

/* ----- spinner ----- */
.spinner{width:140px;height:140px;margin-bottom:16px}
.spinner .track{fill:none;stroke:#fff;stroke-opacity:.22;stroke-width:2.86}
.spinner .head{fill:none;stroke:#fff;stroke-width:2.86;stroke-linecap:round;
  stroke-dasharray:40 200;transform-origin:center;animation:spin .9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.title{margin:0}   /* type comes from .heading-lg (Auro) */
.dots{display:inline-flex}
.dots i{font-style:normal;display:inline-block;animation:bounce 1.2s ease-in-out infinite}
.dots i:nth-child(2){animation-delay:.18s}
.dots i:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,65%,100%{transform:translateY(0)}32%{transform:translateY(-.25em)}}
.sub{color:rgba(255,255,255,.82);margin-top:8px;max-width:640px}   /* type from .heading-sm (Auro) */

/* small screens: let the subheading wrap, tighten to 16px margins */
@media (max-width:600px){
  .stage{padding:16px}
  .sub{max-width:100%}
}

/* ----- completion mark ----- */
.mark{width:140px;height:140px;margin-bottom:16px}
.mark .ring{fill:none;stroke:#fff;stroke-width:3.43;stroke-dasharray:164;stroke-dashoffset:164;
  transform:rotate(-90deg);transform-origin:center}
[data-state="complete"] .mark .ring{stroke-dashoffset:0;transition:stroke-dashoffset .55s var(--ease)}
.glyph{fill:none;stroke:#fff;stroke-width:3.43;stroke-linecap:round;stroke-linejoin:round;
  opacity:0;transform:scale(.6);transform-origin:center}
[data-state="complete"] .glyph{animation:pop .42s var(--ease) .4s both}
@keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}

@media (prefers-reduced-motion: reduce){
  .spinner .head{animation:none;stroke-dasharray:40 200}
  .dots i{animation:none}
  .view,.mark .ring,.glyph{transition:none!important;animation:none!important}
  [data-state="complete"] .mark .ring{stroke-dashoffset:0}
  .glyph{opacity:1;transform:none}
}
</style>
</head>
<body>

<header class="bar">
  <div class="brandmark">
    <b>Loading system</b>
    <span>Two-step loader</span>
  </div>
  <div class="controls">
    <div class="seg" role="group" aria-label="Brand">
      <button id="bAla" aria-pressed="true">Alaska</button>
      <button id="bHaw" aria-pressed="false">Hawaiian</button>
    </div>
    <div class="seg" role="group" aria-label="Step">
      <button id="sLoad" aria-pressed="true">Loading</button>
      <button id="sDone" aria-pressed="false">Complete</button>
    </div>
    <button class="btn primary" id="run">▶ Run demo</button>
  </div>
</header>

<main class="panel">
  <div class="field">
    <div class="stage" id="loader" data-state="loading" role="status" aria-live="polite" aria-atomic="true">
      <!-- STEP 1 · LOADING -->
      <div class="view load">
        <svg class="spinner" viewBox="0 0 50 50" aria-hidden="true">
          <circle class="track" cx="25" cy="25" r="20"/>
          <circle class="head"  cx="25" cy="25" r="20"/>
        </svg>
        <p class="title heading-lg"><span id="ldText">Ticketing trip</span><span class="dots" aria-hidden="true"><i>.</i><i>.</i><i>.</i></span></p>
        <p class="sub heading-sm" id="ldSub">This may take a minute or two. Please stay on the page.</p>
      </div>
      <!-- STEP 2 · COMPLETE -->
      <div class="view done">
        <svg class="mark" viewBox="0 0 60 60" aria-hidden="true">
          <circle class="ring" cx="30" cy="30" r="26"/>
          <g class="glyph" id="glyph"><path d="M19 30.5 l7 7 l14 -15.5"/></g>
        </svg>
        <p class="title heading-lg" id="doneTitle">Booking complete</p>
      </div>
    </div>
  </div>
</main>

<script>
const loader   = document.getElementById('loader');
const ldText   = document.getElementById('ldText');
const ldSub    = document.getElementById('ldSub');
const doneTitle= document.getElementById('doneTitle');

/* ---- component API ---- */
const Loader = {
  setStatus(text, sub){                 // update while the spinner keeps spinning
    if(text!=null) ldText.textContent = text;
    if(sub!=null)  ldSub.textContent  = sub;
  },
  complete(opts={}){                    // go to step 2
    if(opts.title) doneTitle.textContent = opts.title;
    loader.dataset.state = 'complete';
    setPressed(sLoad,false); setPressed(sDone,true);
  },
  reset(){                              // back to step 1 (re-arms the draw-in)
    loader.dataset.state = 'loading';
    setPressed(sLoad,true); setPressed(sDone,false);
  }
};

/* ---- demo chrome ---- */
const bAla=document.getElementById('bAla'), bHaw=document.getElementById('bHaw');
const sLoad=document.getElementById('sLoad'), sDone=document.getElementById('sDone');
function setPressed(el,v){el.setAttribute('aria-pressed',v);}

function setBrand(b){
  document.documentElement.setAttribute('data-brand',b);
  setPressed(bAla,b==='alaska'); setPressed(bHaw,b==='hawaiian');
}
bAla.onclick=()=>setBrand('alaska');
bHaw.onclick=()=>setBrand('hawaiian');

sLoad.onclick=()=>Loader.reset();
sDone.onclick=()=>Loader.complete();

/* run demo: loading (with changing text) -> complete */
document.getElementById('run').onclick=()=>{
  Loader.reset();
  const seq=['Ticketing trip','Confirming your seats','Issuing your ticket'];
  let i=0; Loader.setStatus(seq[0]);
  const t=setInterval(()=>{ i++; if(i<seq.length) Loader.setStatus(seq[i]);
    else { clearInterval(t); Loader.complete({title:'Booking complete'}); } },1500);
};

setBrand('alaska');
</script>
</body>
</html>
